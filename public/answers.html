<!DOCTYPE html>
<html>
<head>
  <title>Our Story - Bhawya ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(45deg, #ff69b4, #ffb6c1, #ff1493, #dc143c);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
      color: white;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 3em;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 1.2em;
      margin-bottom: 40px;
      opacity: 0.95;
    }

    .answers-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .answer-item {
      background: rgba(255, 255, 255, 0.15);
      border-left: 4px solid rgba(255, 255, 255, 0.5);
      padding: 20px;
      border-radius: 10px;
      animation: slideIn 0.5s ease-out;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .answer-item:hover {
      transform: translateX(5px);
      box-shadow: 0 4px 16px rgba(255, 105, 180, 0.3);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .stage {
      font-family: 'Dancing Script', cursive;
      font-size: 1.4em;
      color: #ffeb3b;
      margin-bottom: 8px;
    }

    .response {
      font-size: 1.3em;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
    }

    .response.yes {
      color: #66BB6A;
    }

    .response.no {
      color: #ff7043;
    }

    .timestamp {
      font-size: 0.9em;
      opacity: 0.7;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      font-size: 1.2em;
      opacity: 0.8;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.25);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: all 0.3s;
      text-align: center;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: translateY(-2px);
    }

    .clear-btn {
      display: inline-block;
      margin-top: 20px;
      margin-left: 10px;
      padding: 12px 30px;
      background: rgba(244, 67, 54, 0.6);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1em;
    }

    .clear-btn:hover {
      background: rgba(244, 67, 54, 0.8);
      transform: translateY(-2px);
    }

    .button-group {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .heart-decoration {
      text-align: center;
      font-size: 2em;
      margin: 20px 0;
    }

    .alert-banner {
      background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      font-size: 1.2em;
      font-weight: bold;
      text-align: center;
      animation: shake 0.5s ease-in-out;
      box-shadow: 0 4px 16px rgba(255, 107, 107, 0.5);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .response.NO {
      color: #ff6b6b !important;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="alert"></div>
    <h1>Our Beautiful Story 💕</h1>
    <div class="subtitle">Every moment with you, Bhawya ✨</div>
    <div class="heart-decoration">💖 ❤️ 💕</div>

    <div class="answers-list" id="answers"></div>

    <div class="empty-state" id="empty" style="display: none;">
      <div>No responses yet...</div>
      <div style="margin-top: 20px; font-size: 3em;">🥺</div>
    </div>

    <div class="button-group">
      <a href="index.html" class="back-link">← Back to Question</a>
      <button class="clear-btn" onclick="clearAnswers()">Clear History</button>
    </div>
  </div>

  <script>
    function displayAnswers() {
      const answers = JSON.parse(localStorage.getItem('answers') || '[]');
      const container = document.getElementById('answers');
      const emptyState = document.getElementById('empty');
      const alertContainer = document.getElementById('alert');

      // Check if there's any NO response
      const hasNo = answers.some(item => item.response === 'NO');
      if (hasNo) {
        alertContainer.innerHTML = '⚠️ She said NO! 😢 But don\'t give up! Try again! 💪';
        alertContainer.className = 'alert-banner';
      }

      if (answers.length === 0) {
        emptyState.style.display = 'block';
        container.style.display = 'none';
        return;
      }

      container.style.display = 'flex';
      emptyState.style.display = 'none';
      container.innerHTML = answers.map((item, idx) => {
        let stage = item.stage || 'Unknown';
        let response = item.response || 'Response';
        let timestamp = item.timestamp || '';

        // Clean up stage name for display
        const stageDisplay = stage.charAt(0).toUpperCase() + stage.slice(1);

        return `
          <div class="answer-item">
            <div class="stage">💭 ${stageDisplay}</div>
            <div class="response ${response === 'YES' ? 'yes' : 'NO'}">
              ${response === 'YES' ? '✅' : '❌'} ${response}
            </div>
            ${timestamp ? `<div class="timestamp">📅 ${timestamp}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function clearAnswers() {
      if (confirm('Are you sure you want to clear all responses? 💔')) {
        localStorage.removeItem('answers');
        displayAnswers();
      }
    }

    displayAnswers();
  </script>
</body>
</html>
