<!DOCTYPE html>
<html>
<head>
  <title>For Bhawya ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(45deg, #ff69b4, #ffb6c1, #ff1493, #dc143c);
      background-size: 400% 400%;
      animation: gradientShift 6s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: white;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '❤️';
      position: absolute;
      top: 10%;
      left: 10%;
      font-size: 3em;
      animation: float 4s ease-in-out infinite;
    }

    body::after {
      content: '💖';
      position: absolute;
      top: 20%;
      right: 15%;
      font-size: 2.5em;
      animation: float 5s ease-in-out infinite reverse;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .name-tag {
      font-family: 'Dancing Script', cursive;
      font-size: 1.8em;
      margin-bottom: 20px;
      opacity: 0.95;
    }

    #question {
      font-family: 'Dancing Script', cursive;
      font-size: 2.8em;
      margin-bottom: 40px;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
      animation: pulse 2s infinite;
      max-width: 90%;
      text-align: center;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    button {
      font-family: 'Roboto', sans-serif;
      font-size: 1.8em;
      font-weight: 500;
      padding: 20px 40px;
      margin: 15px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    #yes {
      background: linear-gradient(45deg, #4CAF50, #66BB6A, #81C784);
      color: white;
    }

    #yes:hover {
      background: linear-gradient(45deg, #45a049, #5CB85C, #4CAF50);
      transform: translateY(-5px) scale(1.1);
      box-shadow: 0 12px 24px rgba(0,0,0,0.4);
    }

    #no {
      background: linear-gradient(45deg, #f44336, #e57373, #ef5350);
      color: white;
    }

    #no:hover {
      background: linear-gradient(45deg, #da190b, #D32F2F, #f44336);
      transform: translateY(-5px) scale(1.1);
      box-shadow: 0 12px 24px rgba(0,0,0,0.4);
    }

    #response {
      font-size: 2.2em;
      margin-top: 40px;
      text-align: center;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    a {
      color: white;
      text-decoration: none;
      font-size: 1em;
      margin-top: 30px;
      opacity: 0.85;
      transition: opacity 0.3s;
    }

    a:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="name-tag">For Bhawya 💕</div>
  <div id="question">Will you make me the happiest person and be my forever?</div>
  <button id="yes">Yes</button>
  <button id="no">No</button>
  <div id="response"></div>
  <a href="answers.html">📖 View Our Story</a>
  <script>
    let stage = 'main';
    const question = document.getElementById('question');
    const yesBtn = document.getElementById('yes');
    const noBtn = document.getElementById('no');
    const response = document.getElementById('response');

    const questions = {
      main: {
        text: "Will you make me the happiest person and be my forever?",
        yes: "💕 Bhawya, do you believe in true love?",
        no: "😢 Please press yes"
      },
      love: {
        text: "Do you believe love like ours is meant to last?",
        yes: "💕 Will you let me be by your side through everything?",
        no: "😢 Please press yes"
      },
      beside: {
        text: "Will you trust me with your heart, Bhawya?",
        yes: "💕 Can I be the one you run to on both good and bad days?",
        no: "😢 Please press yes"
      },
      trust: {
        text: "Will you dance with me through life's beautiful journey?",
        yes: "💕 Do you want to build beautiful memories together?",
        no: "😢 Please press yes"
      },
      dance: {
        text: "Bhawya, will you be mine, forever and always?",
        yes: "🎉 You've made me the happiest! I love you! ❤️",
        no: "😢 Please press yes"
      }
    };

    const stageOrder = ['main', 'love', 'beside', 'trust', 'dance'];

    function saveAnswer(ans) {
      const answers = JSON.parse(localStorage.getItem('answers') || '[]');
      answers.push({ answer: ans, timestamp: new Date().toLocaleString() });
      localStorage.setItem('answers', JSON.stringify(answers));
    }

    function shuffleButtons() {
      const buttons = [yesBtn, noBtn];
      buttons.sort(() => Math.random() - 0.5);
      const container = document.body;
      buttons.forEach(btn => container.appendChild(btn));
    }

    yesBtn.addEventListener('click', () => {
      if (stage === 'dance') {
        saveAnswer({ stage: 'Forever', response: 'YES! 💕' });
        response.innerHTML = '🎉 Bhawya, you\'ve made me the happiest! I love you so much! ❤️';
        yesBtn.style.display = 'none';
        noBtn.style.display = 'none';
        question.textContent = '';
      } else {
        const currentIndex = stageOrder.indexOf(stage);
        saveAnswer({ stage: stage, response: 'YES' });
        response.innerHTML = questions[stage].yes;
        const nextStage = stageOrder[currentIndex + 1];
        if (nextStage) {
          question.textContent = questions[nextStage].text;
          stage = nextStage;
          setTimeout(() => shuffleButtons(), 300);
        }
      }
    });

    noBtn.addEventListener('click', () => {
      saveAnswer({ stage: stage, response: 'NO' });
      response.innerHTML = questions[stage].no;
    });
  </script>
</body>
</html>
